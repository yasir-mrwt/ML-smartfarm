services:
  - type: web
    name: smart-farm-ai-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: FRONTEND_ORIGIN
        sync: false
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false
      - key: ML_API_URL
        sync: false
      - key: ML_TIMEOUT_MS
        value: "30000"
      - key: FARM_LATITUDE
        value: "34.0016"
      - key: FARM_LONGITUDE
        value: "71.4859"
      - key: WEATHER_REFRESH_MINUTES
        value: "10"
      - key: DEFAULT_DEVICE_ID
        value: smartFarm001
      - key: PROCESS_COOLDOWN_MS
        value: "5000"
